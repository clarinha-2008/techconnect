<main>

  <h2>Contato</h2>

  <form>

    <label>Nome:</label><br>
    <input type="text" required placeholder="Nome"><br><br>

    <label>Email:</label><br>
    <input type="email" required placeholder="email@gmail.com"><br><br>

    <label>Telefone:</label><br>
    <input type="tel" placeholder="(00)0 0000-0000"><br><br>

    <label>Tipo de Serviço:</label><br>
    <select>
      <option>Site simples</option>
      <option>Site profissional</option>
      <option>Marketing Digital</option>
      <option>Suporte Técnico</option>
    </select><br><br>

    <label>Mensagem:</label><br>
    <textarea placeholder="insira sua mensagem aqui"></textarea><br><br>

    <input type="checkbox"> Aceito os termos<br><br>

    <button type="submit">Enviar</button>

  </form>

</main>
